<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=600, height=600, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Meta Ray-Ban Display playlist player for YouTube embeds.">
    <title>Meta Display Playlist</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-root" aria-live="polite">
      <section id="home-screen" class="screen active" data-screen="home">
        <header class="topbar">
          <div>
            <p class="eyebrow">Meta Display</p>
            <h1 id="playlist-title">Playlist</h1>
          </div>
          <div class="yt-mark" aria-hidden="true">YT</div>
        </header>

        <div class="session-panel">
          <span class="session-dot" aria-hidden="true"></span>
          <span id="playlist-summary">Loading playlist...</span>
        </div>

        <div class="playlist-toolbar">
          <span id="playlist-updated">Waiting for playlist data</span>
          <button class="focusable compact-button" data-action="refresh-playlist">Refresh</button>
        </div>

        <nav class="action-list playlist-list" id="playlist-list" aria-label="Playlist videos">
          <div class="empty-card">Loading videos...</div>
        </nav>

        <p class="footer-note">Select a video. The player stays inside this app.</p>
      </section>

      <section id="player-screen" class="screen" data-screen="player">
        <header class="cinema-bar">
          <button class="focusable icon-button cinema-icon" data-action="back" aria-label="Back">&#8592;</button>
          <div class="cinema-title">
            <p class="eyebrow" id="player-eyebrow">Now playing</p>
            <h2 id="video-title">Playlist video</h2>
          </div>
          <button id="controls-toggle" class="focusable compact-button cinema-toggle" data-action="toggle-controls" data-preferred-focus aria-expanded="false">Controls</button>
        </header>

        <div class="player-shell">
          <div id="player-target" class="player-target" aria-label="YouTube player"></div>
        </div>

        <div class="player-status" id="player-status">Choose a video from the playlist.</div>

        <div id="player-controls" class="control-grid controls-drawer is-hidden" aria-label="Player controls">
          <button id="play-toggle" class="focusable control-button primary" data-action="player-toggle">
            <span class="content">Play / Pause</span>
          </button>
          <button class="focusable control-button" data-action="previous-video">
            <span class="content">Previous</span>
          </button>
          <button class="focusable control-button" data-action="next-video">
            <span class="content">Next</span>
          </button>
          <button class="focusable control-button" data-action="refresh-playlist">
            <span class="content">Refresh List</span>
          </button>
        </div>
      </section>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </main>

    <noscript>This app needs JavaScript to launch the YouTube web player.</noscript>
    <script src="app.js" defer></script>
  </body>
</html>
